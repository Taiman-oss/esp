<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G'isht Hisoblagich</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; color:#fff; font-family:'Segoe UI',sans-serif; min-height:100vh; }

  header {
    background:linear-gradient(135deg,#e94560,#c84b31);
    padding:14px 16px; text-align:center;
  }
  header h1 { font-size:18px; font-weight:700; }
  header p { font-size:12px; opacity:0.85; margin-top:2px; }

  #uploadArea {
    margin:16px; border:2px dashed rgba(255,255,255,0.25);
    border-radius:16px; padding:30px 16px; text-align:center;
    cursor:pointer; transition:0.2s; background:rgba(255,255,255,0.04);
  }
  #uploadArea:hover { border-color:#e94560; background:rgba(233,69,96,0.07); }
  #uploadArea .icon { font-size:40px; margin-bottom:8px; }
  #uploadArea p { font-size:13px; color:#aaa; }
  #fileInput { display:none; }

  #cameraBtn {
    display:block; margin:0 16px 16px;
    padding:13px; background:linear-gradient(135deg,#0f3460,#16213e);
    border:1px solid rgba(255,255,255,0.15); border-radius:12px;
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    transition:0.2s; width:calc(100% - 32px);
  }
  #cameraBtn:hover { background:linear-gradient(135deg,#1a4a7a,#1e2d4a); }

  #preview { display:none; margin:16px; position:relative; }
  #preview canvas { width:100%; border-radius:12px; display:block; }

  #controls {
    display:none; margin:0 16px 12px;
    background:rgba(255,255,255,0.05); border-radius:12px; padding:14px;
  }
  .ctrl-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px; }
  .ctrl-row label { width:120px; color:#ccc; flex-shrink:0; }
  .ctrl-row input[type=range] { flex:1; accent-color:#e94560; }
  .ctrl-row span { width:36px; text-align:right; color:#e94560; font-weight:bold; font-size:12px; }

  #analyzeBtn {
    display:none; width:calc(100%-32px); margin:0 16px 16px;
    padding:14px; background:linear-gradient(135deg,#e94560,#c84b31);
    border:none; border-radius:12px; color:#fff; font-size:15px;
    font-weight:700; cursor:pointer; transition:0.2s;
    width: calc(100% - 32px);
  }
  #analyzeBtn:hover { opacity:0.9; transform:scale(0.99); }
  #analyzeBtn:disabled { opacity:0.5; cursor:default; transform:none; }

  #results { display:none; margin:0 16px 20px; }
  .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .result-card {
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    border-radius:12px; padding:12px; text-align:center;
  }
  .result-card .val { font-size:28px; font-weight:800; color:#e94560; line-height:1; }
  .result-card .lbl { font-size:11px; color:#999; margin-top:4px; }
  .result-card.green .val { color:#00ff88; }
  .result-card.blue .val { color:#00ccff; }
  .result-card.gold .val { color:#ffd700; }

  .detail-box {
    background:rgba(255,255,255,0.04); border-radius:10px;
    padding:12px; font-size:12px; color:#bbb; line-height:1.8;
  }
  .detail-box strong { color:#fff; }

  #loading {
    display:none; text-align:center; padding:20px;
    font-size:13px; color:#aaa;
  }
  .spin {
    width:32px; height:32px; border:3px solid rgba(255,255,255,0.1);
    border-top-color:#e94560; border-radius:50%;
    animation:spin 0.7s linear infinite; margin:0 auto 10px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Camera modal */
  #camModal {
    display:none; position:fixed; inset:0;
    background:#000; z-index:100; flex-direction:column;
  }
  #camModal.active { display:flex; }
  #camVideo { width:100%; flex:1; object-fit:cover; }
  #camToolbar {
    display:flex; gap:10px; padding:14px;
    background:#111; justify-content:center;
  }
  #snapBtn {
    padding:12px 30px; background:#e94560; border:none;
    border-radius:10px; color:#fff; font-size:15px; font-weight:700; cursor:pointer;
  }
  #closeCamBtn {
    padding:12px 20px; background:#333; border:none;
    border-radius:10px; color:#fff; font-size:14px; cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <h1>🧱 G'isht Hisoblagich</h1>
  <p>Rasm orqali g'isht soni va o'lchamini aniqlang</p>
</header>

<!-- Upload -->
<div id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📁</div>
  <p>Rasmni tanlash uchun bosing</p>
  <p style="margin-top:4px;font-size:11px">JPG, PNG, WEBP</p>
</div>
<input type="file" id="fileInput" accept="image/*">

<!-- Camera -->
<button id="cameraBtn">📷 Kamera bilan suratga olish</button>

<!-- Preview canvas -->
<div id="preview"><canvas id="canvas"></canvas></div>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-row">
    <label>Sezgirlik</label>
    <input type="range" id="thresh" min="10" max="80" value="35">
    <span id="threshVal">35</span>
  </div>
  <div class="ctrl-row">
    <label>Min hajm</label>
    <input type="range" id="minSize" min="5" max="60" value="18">
    <span id="minSizeVal">18</span>
  </div>
  <div class="ctrl-row">
    <label>G'isht nisbati</label>
    <input type="range" id="ratio" min="10" max="50" value="22">
    <span id="ratioVal">2.2</span>
  </div>
</div>

<button id="analyzeBtn">🔍 G'ishtlarni Hisoblash</button>

<div id="loading"><div class="spin"></div>Tahlil qilinmoqda...</div>

<div id="results">
  <div class="result-grid">
    <div class="result-card"><div class="val" id="rTotal">0</div><div class="lbl">Jami g'isht</div></div>
    <div class="result-card green"><div class="val" id="rRows">0</div><div class="lbl">Qator soni</div></div>
    <div class="result-card blue"><div class="val" id="rCols">0</div><div class="lbl">Ustun soni</div></div>
    <div class="result-card gold"><div class="val" id="rConf">0%</div><div class="lbl">Ishonchlilik</div></div>
  </div>
  <div class="detail-box" id="detailBox"></div>
</div>

<!-- Camera modal -->
<div id="camModal">
  <video id="camVideo" autoplay playsinline muted></video>
  <div id="camToolbar">
    <button id="snapBtn">📸 Suratga olish</button>
    <button id="closeCamBtn">✕ Yopish</button>
  </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const cameraBtn = document.getElementById('cameraBtn');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const previewEl = document.getElementById('preview');
const controlsEl = document.getElementById('controls');
const analyzeBtn = document.getElementById('analyzeBtn');
const loadingEl = document.getElementById('loading');
const resultsEl = document.getElementById('results');
const camModal = document.getElementById('camModal');
const camVideo = document.getElementById('camVideo');

let origImage = null;

// Sliders
['thresh','minSize','ratio'].forEach(id => {
  const el = document.getElementById(id);
  const val = document.getElementById(id+'Val');
  el.addEventListener('input', () => {
    val.textContent = id==='ratio' ? (el.value/10).toFixed(1) : el.value;
  });
});

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadImage(f);
});

cameraBtn.addEventListener('click', async () => {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    camVideo.srcObject = s;
    camModal.classList.add('active');
  } catch(e) { alert('Kamera ochilmadi: '+e.message); }
});

document.getElementById('snapBtn').addEventListener('click', () => {
  const tmp = document.createElement('canvas');
  tmp.width = camVideo.videoWidth;
  tmp.height = camVideo.videoHeight;
  tmp.getContext('2d').drawImage(camVideo, 0, 0);
  tmp.toBlob(blob => {
    camVideo.srcObject.getTracks().forEach(t=>t.stop());
    camModal.classList.remove('active');
    loadImage(blob);
  }, 'image/jpeg', 0.95);
});

document.getElementById('closeCamBtn').addEventListener('click', () => {
  if (camVideo.srcObject) camVideo.srcObject.getTracks().forEach(t=>t.stop());
  camModal.classList.remove('active');
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      origImage = img;
      // Draw on canvas
      const maxW = window.innerWidth - 32;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      previewEl.style.display = 'block';
      controlsEl.style.display = 'block';
      analyzeBtn.style.display = 'block';
      resultsEl.style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

analyzeBtn.addEventListener('click', () => {
  if (!origImage) return;
  analyzeBtn.disabled = true;
  loadingEl.style.display = 'block';
  resultsEl.style.display = 'none';
  setTimeout(() => {
    try { analyze(); } catch(e) { alert('Xato: '+e.message); }
    analyzeBtn.disabled = false;
    loadingEl.style.display = 'none';
  }, 80);
});

function analyze() {
  const thresh = parseInt(document.getElementById('thresh').value);
  const minSz = parseInt(document.getElementById('minSize').value);
  const targetRatio = parseFloat(document.getElementById('ratio').value) / 10;

  // Offscreen full-res
  const off = document.createElement('canvas');
  off.width = origImage.width;
  off.height = origImage.height;
  const oc = off.getContext('2d');
  oc.drawImage(origImage, 0, 0);

  const W = off.width, H = off.height;
  const data = oc.getImageData(0, 0, W, H);
  const px = data.data;

  // --- 1. Grayscale ---
  const gray = new Uint8Array(W * H);
  for (let i = 0; i < W * H; i++) {
    gray[i] = (px[i*4]*77 + px[i*4+1]*150 + px[i*4+2]*29) >> 8;
  }

  // --- 2. Sobel edge detection ---
  const edge = new Uint8Array(W * H);
  for (let y = 1; y < H-1; y++) {
    for (let x = 1; x < W-1; x++) {
      const i = y*W+x;
      const gx = -gray[i-W-1] + gray[i-W+1] - 2*gray[i-1] + 2*gray[i+1] - gray[i+W-1] + gray[i+W+1];
      const gy = -gray[i-W-1] - 2*gray[i-W] - gray[i-W+1] + gray[i+W-1] + 2*gray[i+W] + gray[i+W+1];
      const mag = Math.min(255, Math.sqrt(gx*gx + gy*gy));
      edge[i] = mag > thresh ? 255 : 0;
    }
  }

  // --- 3. Horizontal & vertical line projection ---
  const hProj = new Float32Array(H);
  const vProj = new Float32Array(W);
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      if (edge[y*W+x]) { hProj[y]++; vProj[x]++; }
    }

  // Normalize
  const hMax = Math.max(...hProj) || 1;
  const vMax = Math.max(...vProj) || 1;
  for (let y=0;y<H;y++) hProj[y]/=hMax;
  for (let x=0;x<W;x++) vProj[x]/=vMax;

  // --- 4. Find peaks (mortar lines) ---
  function findPeaks(proj, minGap) {
    const peaks = [];
    const n = proj.length;
    for (let i = minGap; i < n - minGap; i++) {
      if (proj[i] > 0.25) {
        let isMax = true;
        for (let j = Math.max(0,i-3); j <= Math.min(n-1,i+3); j++) {
          if (j !== i && proj[j] >= proj[i]) { isMax=false; break; }
        }
        if (isMax) {
          // Check min gap from last peak
          if (!peaks.length || i - peaks[peaks.length-1] >= minGap) {
            peaks.push(i);
          }
        }
      }
    }
    return peaks;
  }

  const hPeaks = findPeaks(hProj, minSz);
  const vPeaks = findPeaks(vProj, minSz);

  // Row & col counts from gaps
  const rows = hPeaks.length > 1 ? hPeaks.length - 1 : hPeaks.length;
  const cols = vPeaks.length > 1 ? vPeaks.length - 1 : vPeaks.length;

  // Avg brick size
  let avgH = 0, avgW2 = 0;
  if (hPeaks.length > 1) {
    const diffs = hPeaks.slice(1).map((v,i)=>v-hPeaks[i]);
    avgH = diffs.reduce((a,b)=>a+b,0)/diffs.length;
  } else avgH = H / Math.max(rows, 1);

  if (vPeaks.length > 1) {
    const diffs = vPeaks.slice(1).map((v,i)=>v-vPeaks[i]);
    avgW2 = diffs.reduce((a,b)=>a+b,0)/diffs.length;
  } else avgW2 = W / Math.max(cols, 1);

  // Confidence: how close ratio is to target
  const measuredRatio = avgH > 0 ? avgW2 / avgH : 0;
  const ratioErr = Math.abs(measuredRatio - targetRatio) / targetRatio;
  const conf = Math.max(0, Math.min(100, Math.round((1 - ratioErr) * 85 + (hPeaks.length > 3 ? 15 : 0))));

  const total = Math.max(rows, 1) * Math.max(cols, 1);

  // --- 5. Draw results on canvas ---
  const scale = canvas.width / W;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(origImage, 0, 0, canvas.width, canvas.height);

  // Draw horizontal mortar lines
  ctx.strokeStyle = 'rgba(0,255,136,0.75)';
  ctx.lineWidth = 1.5;
  hPeaks.forEach(y => {
    ctx.beginPath();
    ctx.moveTo(0, y*scale);
    ctx.lineTo(canvas.width, y*scale);
    ctx.stroke();
  });

  // Draw vertical mortar lines
  ctx.strokeStyle = 'rgba(0,200,255,0.75)';
  vPeaks.forEach(x => {
    ctx.beginPath();
    ctx.moveTo(x*scale, 0);
    ctx.lineTo(x*scale, canvas.height);
    ctx.stroke();
  });

  // Overlay brick regions
  if (hPeaks.length > 1 && vPeaks.length > 1) {
    ctx.fillStyle = 'rgba(233,69,96,0.12)';
    for (let r=0;r<hPeaks.length-1;r++) {
      for (let c=0;c<vPeaks.length-1;c++) {
        const y1=hPeaks[r]*scale, y2=hPeaks[r+1]*scale;
        const x1=vPeaks[c]*scale, x2=vPeaks[c+1]*scale;
        ctx.fillRect(x1+1, y1+1, x2-x1-2, y2-y1-2);
      }
    }
  }

  // Counter badge
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.beginPath();
  ctx.roundRect(8, 8, 150, 44, 8);
  ctx.fill();
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 22px Segoe UI';
  ctx.fillText(`🧱 ${total} ta`, 14, 36);

  // Show results
  document.getElementById('rTotal').textContent = total;
  document.getElementById('rRows').textContent = Math.max(rows, 1);
  document.getElementById('rCols').textContent = Math.max(cols, 1);
  document.getElementById('rConf').textContent = conf + '%';

  const brickWpx = avgW2.toFixed(0);
  const brickHpx = avgH.toFixed(0);
  document.getElementById('detailBox').innerHTML = `
    <strong>📐 O'rtacha g'isht o'lchami:</strong><br>
    &nbsp;&nbsp;Eni: ~${brickWpx}px &nbsp;|&nbsp; Bo'yi: ~${brickHpx}px<br>
    &nbsp;&nbsp;Nisbat (e/b): ${measuredRatio.toFixed(2)}<br><br>
    <strong>📊 Qatorlar:</strong> ${Math.max(rows,1)} ta &nbsp;|&nbsp; <strong>Ustunlar:</strong> ${Math.max(cols,1)} ta<br>
    <strong>🟢 Yashil chiziq:</strong> Gorizontal darza<br>
    <strong>🔵 Ko'k chiziq:</strong> Vertikal darza<br><br>
    <em>💡 Natija noto'g'ri bo'lsa, sezgirlik va min hajmni sozlang</em>
  `;

  resultsEl.style.display = 'block';
  previewEl.scrollIntoView({ behavior:'smooth' });
}
</script>
</body>
</html>
